cards:
  - name: "2023-24 Panini Prizm Victor Wembanyama Silver Prizm PSA 10"
    aliases: ["文班亚马 银折 PSA10", "Wembanyama Silver Prizm"]
    platforms: ["cardhobby", "ebay"]
  - name: "2018-19 Panini National Treasures Luka Doncic RPA /99"
    aliases: ["东契奇 RPA", "Doncic RPA NT"]
    platforms: ["goldin", "pwcc", "ebay"]

thresholds:
  daily_change: 0.15           # 异常阈值：单日涨跌超过 15%
  min_price_usd: 10
  min_price_cny: 100

platform_keys:
  ebay_app_id: ""             # eBay Finding API App ID（免费申请：https://developer.ebay.com/）

# 演示模式：当真实抓取不到数据时，自动插入示例数据用于验证飞书推送流程
demo_mode: false

notifications:
  feishu:
    webhook_url: ""             # 用户填写飞书 Webhook 地址
    secret: ""                  # 飞书机器人签名校验密钥（可选，未开启签名则留空）
    enable_daily: true          # 是否发送每日日报
    enable_alert: true          # 异常时是否推送提醒
    daily_time: "09:00"         # 日报发送时间（北京时间）

schedule:
  timezone: "Asia/Shanghai"
