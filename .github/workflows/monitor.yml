name: 🏀 NBA Card Monitor

on:
  schedule:
    - cron: '0 1 * * *'      # 北京时间每天 09:00 (UTC+8)
  workflow_dispatch:           # 支持手动触发
    inputs:
      demo:
        description: '启用演示模式（插入示例数据用于测试推送）'
        required: false
        default: 'false'

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run monitor
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          CARD_MONITOR_DEMO: ${{ github.event.inputs.demo }}
        run: python main.py

      - name: Upload database artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: price-database
          path: data/prices.db

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-logs
          path: logs/
